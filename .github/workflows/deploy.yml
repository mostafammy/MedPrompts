name: Deploy Next.js to Cloudflare

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build OpenNext artifact
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Cache Next.js build output
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*', 'public/**/*', 'next.config.*', 'open-next.config.*') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate wrangler config (no placeholder KV IDs)
        run: |
          if [ ! -f wrangler.jsonc ]; then
            echo "ERROR: wrangler.jsonc not found."
            exit 1
          fi
          if grep -q '"PLACEHOLDER"' wrangler.jsonc; then
            echo "ERROR: wrangler.jsonc contains placeholder KV namespace IDs."
            echo "Replace every \"id\": \"PLACEHOLDER\" with a real Turso/Cloudflare KV ID before deploying."
            exit 1
          fi

      - name: Lint
        run: pnpm run lint

      - name: Build Next.js and OpenNext
        run: pnpm run build
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}


      - name: Upload OpenNext artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-next-${{ github.sha }}
          path: .open-next
          if-no-files-found: error
          retention-days: 7
          include-hidden-files: true

      - name: Inject secrets into wrangler.jsonc
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          node -e "
            const fs = require('fs');
            let content = fs.readFileSync('wrangler.jsonc', 'utf8');
            content = content.replace(/\"TURSO_DATABASE_URL\":\s*\"\"/, '\"TURSO_DATABASE_URL\": \"' + process.env.TURSO_DATABASE_URL + '\"');
            content = content.replace(/\"TURSO_AUTH_TOKEN\":\s*\"\"/, '\"TURSO_AUTH_TOKEN\": \"' + process.env.TURSO_AUTH_TOKEN + '\"');
            fs.writeFileSync('wrangler.jsonc', content);
          "
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Deploy to Cloudflare Workers
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: pnpm exec opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
